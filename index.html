<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07090F" />
  <meta name="description"
    content="ResQMesh — Decentralized Emergency Mesh Network. P2P communication, GPS triage, and voice relay. Works completely offline." />

  <!-- Favicon -->
  <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
  <link rel="apple-touch-icon" href="/icon-192.png" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ResQMesh" />

  <!-- SEO -->
  <meta property="og:title" content="ResQMesh — Emergency Mesh Network" />
  <meta property="og:description" content="Decentralized P2P emergency communication. Works offline." />
  <meta property="og:type" content="website" />

  <title>ResQMesh — Emergency Mesh Network</title>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', async () => {
        const isLocalDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isLocalDev) {
          // Dev mode: wipe stale SWs so Vite always serves fresh JS
          const regs = await navigator.serviceWorker.getRegistrations();
          await Promise.all(regs.map(r => r.unregister()));
          const keys = await caches.keys();
          await Promise.all(keys.map(k => caches.delete(k)));
        } else {
          // Production: register SW for full offline support
          navigator.serviceWorker
            .register('/sw.js')
            .then(reg => console.log('[ResQMesh] SW registered:', reg.scope))
            .catch(err => console.warn('[ResQMesh] SW failed:', err));
        }
      });
    }
  </script>
</body>

</html>
